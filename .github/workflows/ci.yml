name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - run: ruff check server/ backend/ scripts/ --ignore E501

  backend-test:
    runs-on: ubuntu-latest
    needs: backend-lint
    continue-on-error: true  # 测试依赖外部 MySQL + Dify，CI 环境大概率不可用
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pip install pytest
      - run: |
          python -m pytest tests/ scripts/test_*.py -v --tb=short || echo "::warning::部分测试跳过或失败（需要 MySQL/Dify 外部服务）"
        env:
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DIFY_APP_API_KEY: ${{ secrets.DIFY_APP_API_KEY }}
          DIFY_BASE_URL: ${{ secrets.DIFY_BASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

  # ------------------------------------------------------------------
  # GitHub Secrets 说明（需在仓库 Settings > Secrets and variables > Actions 配置）：
  #   MYSQL_HOST, MYSQL_PORT, MYSQL_USER, MYSQL_PASSWORD, MYSQL_DATABASE
  #   JWT_SECRET, DIFY_APP_API_KEY, DIFY_BASE_URL
  #   ADMIN_EMAIL, ADMIN_PASSWORD
  # 不配置不影响 lint/build/docker 三个 job
  # ------------------------------------------------------------------

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint
      - run: cd frontend && npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t mingzhu-daodu .
      - run: docker run --rm mingzhu-daodu python -c "print('Docker build OK')"

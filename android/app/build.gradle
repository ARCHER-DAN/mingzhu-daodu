plugins {
    id 'com.android.application'
}

android {
    namespace 'com.mingzhu.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.mingzhu.app"
        minSdk 24
        targetSdk 34
        versionCode 5
        versionName "2.0.4"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.webkit:webkit:1.8.0'
}

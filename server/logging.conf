[loggers]
keys=root,app.api,app.auth,app.proxy,app.db

[handlers]
keys=console,file

[formatters]
keys=default

[formatter_default]
format=%(asctime)s [%(levelname)s] %(name)s: %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[handler_console]
class=StreamHandler
level=INFO
formatter=default
args=(sys.stdout,)

[handler_file]
class=logging.handlers.RotatingFileHandler
level=DEBUG
formatter=default
args=('%(log_dir)s/server.log', 'a', 10485760, 5)

[logger_root]
level=DEBUG
handlers=console,file
qualname=root

[logger_app.api]
level=INFO
handlers=
qualname=app.api
propagate=1

[logger_app.auth]
level=INFO
handlers=
qualname=app.auth
propagate=1

[logger_app.proxy]
level=INFO
handlers=
qualname=app.proxy
propagate=1

[logger_app.db]
level=INFO
handlers=
qualname=app.db
propagate=1
